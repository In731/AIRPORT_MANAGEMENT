<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroManage - Staff Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0F1722;
            --panel-bg: #1B2B3B;
            --primary: #00C9A7;
            --primary-hover: #00A88D;
            --text-main: #FFFFFF;
            --text-muted: #A8B2BC;
            --border: rgba(255, 255, 255, 0.08);
            --danger: #FF4D4D;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at top right, #1B2B3B 0%, transparent 40%),
                radial-gradient(circle at bottom left, #1B2B3B 0%, transparent 40%);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            text-align: center;
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .plane-icon {
            width: 32px;
            height: 32px;
            color: var(--primary);
        }

        .logo-text {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text-main);
            font-size: 15px;
            transition: all 0.2s;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 201, 167, 0.1);
        }

        .btn-login {
            width: 100%;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }

        .btn-login:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(1px);
        }

        .error-message {
            color: var(--danger);
            font-size: 13px;
            margin-top: 16px;
            display: none;
            background: rgba(255, 77, 77, 0.1);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 77, 77, 0.2);
        }

        .footer-text {
            margin-top: 32px;
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="logo-area">
            <svg class="icon plane-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                    d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.6L3 8l6 4-4 4-2.8-.9c-.4-.1-.8.1-1 .5L1 17l4.5 1.5L7 23l1.4-.2c.4-.2.6-.6.5-1L8 19l4-4 4 6l1.2-.7c.4-.2.7-.6.6-1.1z" />
            </svg>
            <div class="logo-text">AeroManage</div>
        </div>
        <div class="subtitle">Secure Management Portal</div>

        <form id="login-form">
            <div class="form-group">
                <label for="management-id">Management ID</label>
                <input type="text" id="management-id" class="form-control" placeholder="Enter your ID e.g. MNG-001"
                    autocomplete="username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••"
                    autocomplete="current-password" required>
            </div>

            <div id="error-msg" class="error-message">Invalid ID or Password. Please try again.</div>

            <button type="submit" class="btn-login" id="login-btn">Secure Login</button>
        </form>

        <div class="footer-text">
            Restricted Access. Authorized personnel only.
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('error-msg');

            const mngId = document.getElementById('management-id').value;
            const password = document.getElementById('password').value;

            btn.textContent = 'Authenticating...';
            btn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: mngId, password: password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Store strict session variable
                    sessionStorage.setItem('aero_auth_token', data.token);
                    sessionStorage.setItem('aero_mng_id', mngId);

                    // Redirect to dashboard
                    window.location.href = '/index.html';
                } else {
                    errorMsg.textContent = data.error || 'Authentication failed.';
                    errorMsg.style.display = 'block';
                    btn.textContent = 'Secure Login';
                    btn.disabled = false;
                }
            } catch (err) {
                errorMsg.textContent = 'Network error. Cannot reach server.';
                errorMsg.style.display = 'block';
                btn.textContent = 'Secure Login';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
